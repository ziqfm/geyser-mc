name: Nightly Geyser Proxy Build

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: read

    steps:
      # 1. Checkout your repository
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 2. Log in to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Setup Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build and Push directly from the geyser folder
      - name: Build and Push Geyser Image
        uses: docker/build-push-action@v5
        with:
          context: ./geyser
          file: ./geyser/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/geyser-pi5:latest
            ghcr.io/${{ github.repository_owner }}/geyser-pi5:nightly
